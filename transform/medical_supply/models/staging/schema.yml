version: 2

models:
  - name: stg_orders
    description: "Cleaned orders from Olist dataset"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 
                      'invoiced', 'processing', 'created', 'approved']

  - name: stg_payments
    description: "Cleaned payments from Olist dataset"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_amount
        tests:
          - not_null
      - name: payment_type
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

  - name: stg_fraud
    description: "Cleaned fraud signals from IEEE-CIS dataset"
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: is_fraud
        tests:
          - not_null
          