version: 2

models:
  - name: mart_order_fulfillment
    description: "Order fulfillment mart with delivery status"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: delivery_status
        tests:
          - not_null
          - accepted_values:
              values: ['on_time', 'late', 'not_delivered']
      - name: days_late
        tests:
          - not_null

  - name: mart_shipment_delays
    description: "Late orders with delay categorization"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: delay_category
        tests:
          - not_null
          - accepted_values:
              values: ['critical', 'moderate', 'minor', 'none']

  - name: mart_fraud_signals
    description: "Fraud rate aggregated by product and card type"
    columns:
      - name: fraud_rate_pct
        tests:
          - not_null
          